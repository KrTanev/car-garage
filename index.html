<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solid Auto</title>
    <script type="text/javascript">
      // Apply the theme before first paint to avoid a light-mode flash.
      // Kept in sync with STORAGE_KEY in src/context/ThemeContext.tsx.
      (function () {
        try {
          var stored = localStorage.getItem('car-garage-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable — fall back to light */
        }
      })();
    </script>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // Un-does the redirect encoding from public/404.html, turning
      // "/car-garage/?/about" back into "/car-garage/about" via
      // history.replaceState before React Router reads the location.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
