<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages has no server-side rewrites, so a direct load of e.g.
      // /car-garage/about 404s (GH Pages serves this file instead). This
      // encodes the requested path into a query string and redirects to the
      // site root, where index.html's inline script (see index.html)
      // decodes it back into a real client-side route.
      //
      // pathSegmentsToKeep must match the number of path segments in the
      // GitHub Pages project base (vite.config.ts `base: '/car-garage/'` → 1).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
